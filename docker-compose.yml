services:
  postgres:
    image: postgres:16-alpine
    container_name: ihk_ap2_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ihk
      POSTGRES_PASSWORD: ihk
      POSTGRES_DB: ihk_ap2
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
